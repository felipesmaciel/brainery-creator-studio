<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>TikTok Authorization | Brainery Creator Studio</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f7faf8;color:#152028;font:16px/1.55 Inter,system-ui,sans-serif}.card{width:min(640px,calc(100% - 36px));padding:32px;border:1px solid #dbe2e5;border-radius:8px;background:#fff}h1{margin:0 0 12px;font-size:1.8rem}p{color:#52636c}code{display:block;overflow-wrap:anywhere;padding:13px;background:#f1f5f3;border-radius:5px;color:#182b35}button{margin-top:14px;border:0;border-radius:5px;background:#274a59;color:#fff;padding:10px 14px;font:inherit;cursor:pointer}.error{color:#a12720}</style></head><body><main class="card"><h1>TikTok authorization</h1><p id="message">Reading the authorization response…</p><code id="value" hidden></code><button id="copy" hidden type="button">Copy authorization code</button><p id="note">Return to Brainery Creator Studio and paste the code only when the desktop app asks for it.</p></main><script>const p=new URLSearchParams(location.search);const code=p.get("code"),error=p.get("error"),detail=p.get("error_description");const message=document.getElementById("message"),value=document.getElementById("value"),copy=document.getElementById("copy");if(code){message.textContent="Authorization approved. Copy this one-time code:";value.textContent=code;value.hidden=false;copy.hidden=false;copy.addEventListener("click",async()=>{await navigator.clipboard.writeText(code);copy.textContent="Copied";});}else{message.className="error";message.textContent="Authorization was not completed.";value.textContent=detail||error||"No authorization code was returned.";value.hidden=false;document.getElementById("note").textContent="You can close this page and try the authorization flow again."}</script></body></html>
